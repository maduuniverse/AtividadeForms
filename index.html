<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Vaga</title>

</head>

<body>

    <form>

        <h1>Cadastro de Vaga de Emprego</h1>

        <fieldset>
            <legend>Dados Pessoais</legend>

            <input type="text" placeholder="Nome completo">
            <input type="text" placeholder="CPF">
            <input type="text" placeholder="RG">
            <input type="date">

            <select>
                <option>Sexo</option>
                <option>Masculino</option>
                <option>Feminino</option>
                <option>Outro</option>
            </select>

        </fieldset>

        <fieldset>
            <legend>Contato</legend>

            <input type="email" placeholder="E-mail">
            <input type="tel" placeholder="Telefone">
            <input type="tel" placeholder="Celular">

        </fieldset>

        <fieldset>
            <legend>Endereço</legend>

            <input type="text" placeholder="Rua">
            <input type="text" placeholder="Número">
            <input type="text" placeholder="Bairro">
            <input type="text" placeholder="Cidade">
            <input type="text" placeholder="Estado">

        </fieldset>

        <fieldset>
            <legend>Informações Profissionais</legend>

            <select>
                <option>Escolaridade</option>
                <option>Ensino Médio</option>
                <option>Graduação</option>
                <option>Pós-graduação</option>
            </select>

            <textarea placeholder="Cursos"></textarea>

            <textarea placeholder="Experiência profissional"></textarea>

            <input type="text" placeholder="Pretensão salarial">

        </fieldset>

        <fieldset>
            <legend>Tecnologias</legend>

            <input type="checkbox"> HTML <br>
            <input type="checkbox"> CSS <br>
            <input type="checkbox"> JavaScript <br>
            <input type="checkbox"> Java <br>
            <input type="checkbox"> Python <br>
            <input type="checkbox"> Banco de Dados <br>

        </fieldset>

        <fieldset>
            <legend>Upload de Currículo</legend>

            <input type="file">

        </fieldset>

        <button type="submit">Cadastrar</button>

    </form>

</body>

</html>
